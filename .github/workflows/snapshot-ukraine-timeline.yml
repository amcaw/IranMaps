name: Weekly Ukraine Timeline Snapshot

on:
  schedule:
    - cron: '0 10 * * 0'  # Every Sunday at 10:00 UTC (after daily conversion)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for pull --rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Take snapshot
        working-directory: app
        run: npm run snapshot

      - name: Commit snapshot
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/static/data/ukraine-archive/
          if git diff --staged --quiet; then
            echo "No new snapshot"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Ukraine timeline snapshot $(date -u +%Y-%m-%d)"
            git pull --rebase -X theirs origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        working-directory: app
        env:
          BASE_PATH: ${{ github.event.repository.name }}
        run: npm run build

      - name: Deploy to gh-pages branch
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/build
