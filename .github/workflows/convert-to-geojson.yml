name: Convert Shapefiles to GeoJSON

on:
  push:
    paths:
      - 'data/zips/*.zip'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: geojson-conversion
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Convert shapefiles to GeoJSON
        working-directory: app
        run: node scripts/convert.js

      - name: Build strikes.json
        working-directory: app
        run: node scripts/preprocess.js

      - name: Commit all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/geojson/*.geojson app/static/data/strikes.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GeoJSON and strikes.json"
            git pull --rebase origin main
            git push
          fi
